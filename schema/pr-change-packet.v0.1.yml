# Trail PR Change Packet — Schema v0.1 (DRAFT)
#
# Status: discover-phase draft, NOT published. Subject to breaking change until v1.0.
# License intent: Apache-2.0 or CC-BY-4.0 (decision deferred to L3 regulatory gate).
# Source basis: ai_native_change_control_expanded_research.md §7.1 (2026-05-08), simplified for MVP.
#
# Design principles (from purpose.yml#how):
#   - Protocol-first: this file is the canonical artifact, not the implementation.
#   - Evidence-grounded: every claim in `summary.claims` MUST have a non-empty `evidence_refs`.
#   - Control-plane: schema describes the change, not the code itself (Git owns code, Trail owns context).
#   - Human keeps the outcome: schema represents an artifact for human review, not a substitute for it.
#
# Cross-product compatibility (synapti):
#   - Evidence reference IDs (DIFF-*, CMD-*, TEST-*, PROMPT-*, ISSUE-*) follow Context Ledger's
#     EV-*/DEC-* convention, allowing Trail packets to be ingested as Context Ledger evidence.
#   - Risk classification levels (low|medium|high|critical) align with Flow's tier model
#     (autonomous|journal|confirm) — see HOOK-EVENT-MATRIX.md for mapping.
#
# v0.1 scope (deliberately minimal — see decision-log 2026-05-08 "MVP bounded context"):
#   IN:  task_intent, agent_session, diff_summary, commands_run, test_evidence,
#        provenance, summary.claims (with evidence refs).
#   OUT: full risk classification, reviewer_focus, blast_radius, approval_trail,
#        policy_results, multi-agent (Claude Code only), full transcript embedding.

packet_version: "0.1"

_meta:
  packet_id: ""              # ULID or UUIDv7, generated by Trail at session start
  generated_at: ""           # ISO 8601, set when packet is finalized
  generator:
    name: "trail"
    version: ""              # Trail CLI version that produced this packet
  schema_url: ""             # URL to this schema file once published

# Pull request context — minimal for v0.1 (no GitHub App yet, so pr_number optional)
pr:
  provider: "github"          # MVP: github only; gitlab/bitbucket deferred to v0.2+
  repository: ""              # "owner/repo"
  branch: ""                  # current branch
  base_branch: ""             # merge target
  pr_number: null             # nullable — populated only when GitHub App ships (v0.2+)
  author: ""                  # git committer / GitHub user

# What the work was supposed to do
task_intent:
  source_type: ""             # "issue" | "prompt" | "manual" | "ticket" | "spec"
  source_ref: ""              # URL or local ref (e.g., "ISSUE-42", file path, or "PROMPT-001")
  summary: ""                 # one-line task summary
  acceptance_criteria: []     # OPTIONAL in v0.1 — Daniel's solo workflow doesn't always have these
  # - "User can switch theme from settings"

# How the work was produced
agent_session:
  tool: "claude-code"         # MVP: claude-code only; cursor/codex/aider deferred
  model: ""                   # e.g., "claude-sonnet-4.6"
  started_at: ""              # ISO 8601
  ended_at: ""                # ISO 8601
  session_id: ""              # Claude Code's session ID (if exposed by hooks)
  transcript_summary: []      # bullet list, NOT full transcript (privacy + size)
  # - "Inspected settings page and theme provider"
  # - "Added theme toggle component"
  prompts:
    initial: ""               # REDACTED before write — see schema/REDACTION-DESIGN.md
    followups: []             # REDACTED before write
    # NOTE: agent self-prompts (subagent invocations) are NOT captured here; they live in
    # the (deferred) full-transcript appendix.
  # Redaction layer observability — REQUIRED in v0.1 per /devils-advocate F5.
  # See schema/REDACTION-DESIGN.md for the three-layer redaction architecture.
  redaction_metadata:
    pattern_set_version: ""        # version of bin/trail-redaction-patterns.yml in use
    redactions_applied: 0          # total count across all captured fields
    redactions_by_pattern: {}      # pattern_name → count (e.g., aws-access-key: 2)
    validation_errors: []          # Layer 2 catches that aborted writes (should be empty)
    skipped_files: []              # files where memory-only snapshot was skipped (e.g., for size)

# What changed in the code
diff_summary:
  base_sha: ""
  head_sha: ""
  files_changed: 0
  lines_added: 0
  lines_deleted: 0
  modules_touched: []         # heuristic: top-level dir of each changed file, deduped
  # Semantic changes — human-readable list of WHAT changed (one entry per logical change).
  # Each entry has a stable ID (DIFF-NNN) so summary claims can reference it.
  # Each entry also carries `excerpts[]` — bounded slices of actual diff content
  # (before/after for Edit, after-only for Write) — so the human renderer can show
  # the diff inline alongside the claim, not just the file path. Closes F1 finding
  # (mechanical claim + metadata-only render adds cognitive load).
  semantic_changes: []
  # - id: "DIFF-001"
  #   description: "Added persisted theme preference"
  #   files: ["src/theme/provider.tsx", "src/theme/storage.ts"]
  #   operation: "edit"            # "write" | "edit" | "multiedit"
  #   excerpts:
  #     - kind: "before"           # "before" | "after" | "before#N" | "after#N" (multiedit)
  #       text: "..."              # bounded ~1200 chars; longer content gets a `[... elided N chars ...]` middle marker
  #       elided: false            # true if original was clipped

# Commands run during the session — ledger, not full output
commands_run: []
# - id: "CMD-001"
#   command: "npm test"        # REDACTED before write
#   exit_code: 0
#   duration_ms: 18420
#   stdout_summary: ""         # REDACTED before write — see schema/REDACTION-DESIGN.md
#   stderr_summary: ""         # REDACTED before write

# Tests attempted and results
test_evidence:
  passed: []                  # list of test file paths or test names
  # - id: "TEST-001"
  #   ref: "theme-provider.test.ts"
  failed: []
  not_run: []                 # tests that exist but weren't executed
  # coverage_change: ""       # DEFERRED to v0.2 — too implementation-specific for MVP

# Who wrote what
provenance:
  authorship:
    ai_generated_estimate: ""   # "high" | "medium" | "low" | "unknown"
    human_modified_estimate: "" # "high" | "medium" | "low" | "unknown"
    method: ""                  # "hook-tracked" | "heuristic" | "self-reported"
                                # v0.1 uses "hook-tracked" for files touched while agent active,
                                # "heuristic" for fallback (no hooks fired).
  agent_touched_files: []     # files modified during agent active spans
  human_touched_files: []     # files modified outside agent active spans (interactive edits)

# THE LOAD-BEARING FIELD: claims with evidence refs.
# Each claim is a sentence in the human-readable PR summary. Every claim MUST cite at least
# one piece of evidence (DIFF-NNN, CMD-NNN, TEST-NNN, PROMPT-NNN, ISSUE-NNN). Claims with
# empty evidence_refs are flagged "ungrounded" by Trail and shown as warnings.
#
# This is the mechanism that pays down cognitive debt: the reviewer reads claims, verifies
# evidence trace, and trusts the summary because every sentence is anchored.
summary:
  claims: []
  # - id: "CLAIM-001"
  #   text: "Added persisted theme preference"
  #   evidence_refs: ["DIFF-001", "TEST-001"]
  #   confidence: "supported"   # "supported" | "partial" | "ungrounded"
  ungrounded_claim_count: 0   # populated by Trail; should be 0 for a healthy packet

# DEFERRED TO v0.2+ (deliberately omitted from v0.1):
#   risk:                      # full classification + reviewer_focus + blast_radius
#   approval_trail:            # depends on GitHub App; not relevant to local-viz MVP
#   policy_results:            # depends on policy engine; out of MVP scope
#   transcript_appendix:       # privacy + size; ship in v0.2 with redaction layer

# Schema validation rules (informal — formal JSON Schema in schema/pr-change-packet.v0.1.schema.json
# at define-phase exit):
# - packet_version MUST be "0.1"
# - All evidence_refs in summary.claims MUST resolve to existing IDs in the packet
# - agent_session.started_at MUST be <= agent_session.ended_at
# - diff_summary.semantic_changes IDs MUST be unique
# - commands_run IDs MUST be unique
# - test_evidence entry IDs MUST be unique
# - At least one of (semantic_changes, commands_run, test_evidence) MUST be non-empty
#   (a packet with no observed work is invalid)
# - agent_session.redaction_metadata.pattern_set_version MUST be non-empty
#   (no packet ships without redaction running)
# - agent_session.redaction_metadata.validation_errors SHOULD be empty
#   (non-empty = Layer 2 caught a Layer 1 miss; investigate before trusting the packet)
#
# Companion files (discover phase):
# - schema/HOOK-EVENT-MATRIX.md — Claude Code hook → field map + risk register
# - schema/PACKET-SHAPE-ALTERNATIVES.md — alternate shapes considered + rationale (F4)
# - schema/REDACTION-DESIGN.md — three-layer redaction architecture (F5, hard gate)
