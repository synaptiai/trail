# Trail PR Change Packet — Schema v0.1.1 (DRAFT)
#
# Status: develop-phase, post-A3 reconciliation 2026-05-08. Additive bump from v0.1.
# All changes are non-breaking: existing v0.1 producers/consumers remain valid; v0.1.1
# additions are optional fields plus tightened enum constraints on previously-free strings.
# License: Apache-2.0 (locked at L1 regulatory gate).
#
# Source basis: pr-change-packet.v0.1.yml + docs/specs/phase-1-capture.md (reconciled)
# + docs/specs/phase-1-capture-audit.md (A2).
#
# Design principles (unchanged from v0.1):
#   - Protocol-first: this file is the canonical artifact, not the implementation.
#   - Evidence-grounded: every claim in `summary.claims` MUST have non-empty `evidence_refs`.
#   - Control-plane: schema describes the change, not the code itself.
#   - Human keeps the outcome: schema represents an artifact for human review.
#
# v0.1 → v0.1.1 changes (all additive):
#   ADDED: _meta.capture_method (string)
#   ADDED: agent_session.models[] (array of unique model strings; complements .model)
#   ADDED: claims[].synthesis_mode (enum: "mechanical" | "llm")
#   ADDED: test_evidence.passed[].cmd_ref (string back-pointer to CMD-NNN)
#   LOCKED ENUM: diff_summary.semantic_changes[].operation ∈ {"write", "edit", "multiedit"}
#   DOCUMENTED: excerpts[].kind extended form "before#N" / "after#N" (MultiEdit, hunks 1..5)
#   ADDED (AB-stage 2026-05-09; Phase 2 B5 §8 reconciliation):
#     - _meta.parent_packet_id (nullable string; AB-6 — re-capture chain link)
#     - claims[].risk_classification.{agent, creator_override, reviewer_override} (AB-1, AB-1a)
#     - claims[].id stability requirement (AB-5 — deterministic across re-captures)
#     - approval_trail[] top-level array (AB-4 — per-claim, per-decision granularity)
#     - posted_to_pr[] array (AB-2 — multi-post history; mirrors libSQL posted_to_pr_history)
#     - redaction_audit.entries[] per-pattern × per-layer breakdown (AB-8)
#   NOT ADDED (closed elsewhere):
#     - approval_trail content hash (AB-3 — resolved at libSQL layer via packets.last_known_hash;
#                                   no packet-schema field required; see B5 §3.3 + §7.1)
#     - in-memory redaction-preview cache (AB-7 — opt-in, session-only; not a packet-schema field;
#                                          see phase-1-capture.md §5)
#
# v0.1 scope (unchanged):
#   IN:  task_intent, agent_session, diff_summary, commands_run, test_evidence,
#        provenance, summary.claims (with evidence refs).
#   OUT: full risk classification, reviewer_focus, blast_radius, approval_trail,
#        policy_results, multi-agent (Claude Code only), full transcript embedding.

packet_version: "0.1.1"

_meta:
  packet_id: ""              # ULID, generated by Trail at packet finalization (NOT session start;
                             # v0.1 schema comment said "session start" but that was aspirational
                             # for hook-driven design — corrected in v0.1.1).
  generated_at: ""           # ISO 8601, set when packet is finalized
  generator:
    name: "trail"
    version: ""              # Trail CLI version that produced this packet (from package.json#version)
  schema_url: ""             # Relative path: "schema/pr-change-packet.v0.1.1.yml" (URL form deferred to v0.2+)
  capture_method: ""         # NEW v0.1.1. Enum: "post_hoc" (Phase 1). v0.2 may add "hook".
  parent_packet_id: null     # NEW v0.1.1 (AB-6). Type: string | null. ULID of the prior packet in
                             # this session's re-capture chain. Null for the first capture (N=1)
                             # under .trail/sessions/<session-id>/. Phase 1 populates by reading
                             # packet-(N-1).yml._meta.packet_id at write time. Consumers (Phase 2 UI)
                             # use this to compute carry-forward of approval state across re-captures.
                             # See phase-1-capture.md §X (AB-stage amendments) for write-time logic.

# Pull request context — populated by simple-git in v0.1.1 (was empty in v0.1 reference)
pr:
  provider: "github"          # MVP: github only; gitlab/bitbucket deferred to v0.2+
  repository: ""              # "owner/repo"
  branch: ""                  # current branch
  base_branch: ""             # merge target (heuristic: origin/main, origin/master, then local main/master)
  pr_number: null             # nullable — populated only when GitHub App ships (v0.2+)
  author: ""                  # git committer email (git config user.email)

# What the work was supposed to do
task_intent:
  source_type: ""             # "issue" | "prompt" | "manual" | "ticket" | "spec"
  source_ref: ""              # URL or local ref (e.g., "ISSUE-42", file path, or "PROMPT-001")
  summary: ""                 # one-line task summary (≤200 chars after redact + \s+→' ' collapse)
  acceptance_criteria: []     # OPTIONAL in v0.1 — Daniel's solo workflow doesn't always have these
  # - "User can switch theme from settings"

# How the work was produced
agent_session:
  tool: "claude-code"         # MVP: claude-code only; cursor/codex/aider deferred
  model: ""                   # Last assistant model seen in transcript (kept for back-compat)
  models: []                  # NEW v0.1.1. Array of unique model strings, in first-encounter order.
                              # Sessions with model switches (e.g., /effort changes) populate multiple.
                              # Per-claim model attribution (claims[].model) deferred to v0.2.
  # - "claude-sonnet-4-6"
  # - "claude-opus-4-7"
  started_at: ""              # ISO 8601 (with +00:00 suffix, NOT Z — locked for parity)
  ended_at: ""                # ISO 8601
  session_id: ""              # filename of the .jsonl minus extension (always present)
  transcript_summary: []      # bullet list, NOT full transcript (privacy + size).
                              # Phase 1 mechanical: deduped tool_use names + first sentence of first
                              # assistant text block. LLM-augmented when available.
  # - "Inspected settings page and theme provider"
  # - "Added theme toggle component"
  prompts:
    initial: ""               # REDACTED. Pipeline: tag-strip (<[^>]+>) → empty-check → 1200-char truncate → redact
    followups: []             # REDACTED. Same pipeline. Empty-after-strip messages skipped (no PROMPT-NNN allocated).
  redaction_metadata:
    pattern_set_version: ""        # version of bin/trail-redaction-patterns.yml (REQUIRED non-empty; no fallback)
    pattern_set_origin: ""         # NEW v0.1.1 (A4.7 R-SEC-1). Enum: "bundled" | "user-supplied".
                                   # Integrity signal — pattern_set_version is user-forgeable when
                                   # origin is "user-supplied" (--patterns flag); downstream consumers
                                   # MUST NOT trust version alone when origin != "bundled".
    redactions_applied: 0          # total count across all captured fields
    redactions_by_pattern: {}      # pattern_name → count, alphabetically sorted for determinism
    validation_errors: []          # Layer 2 catches; one entry per pattern (NOT per match);
                                   # format: {pattern: name, snippet: <8-char-hex>}
                                   # snippet is sha256(match).hexdigest()[:8] — exactly 8 hex characters
                                   # (4 bytes); never the raw match.
                                   # (A4.5 P2-SEC-9; A4.7 R-COUPLING-02 — locks "8 hex chars" across all
                                   # spec/schema locations to prevent parity drift between TS and py.)
    skipped_files: []              # files where memory-only snapshot was skipped (size cap)

# What changed in the code — populated via simple-git in v0.1.1
diff_summary:
  base_sha: ""                  # simple-git
  head_sha: ""                  # simple-git
  files_changed: 0              # GIT DIFF STAT (not count of distinct files touched by tool uses)
  lines_added: 0                # simple-git
  lines_deleted: 0              # simple-git
  modules_touched: []           # heuristic: top-level dir of each changed file INSIDE repo root, deduped.
                                # Files outside repo (e.g., ~/.claude/projects/...) excluded.
  # Semantic changes — human-readable list of WHAT changed (one entry per logical change).
  # Each entry has a stable ID (DIFF-NNN), single-file scope, and operation enum.
  semantic_changes: []
  # - id: "DIFF-001"
  #   description: "Edited src/theme/provider.tsx"   # tool-specific format:
  #                                                  #   Write:     "Wrote {fp} ({char_count} chars)"
  #                                                  #   Edit:      "Edited {fp}"
  #                                                  #   MultiEdit: "MultiEdit on {fp} ({hunk_count} hunk(s))"
  #   files: ["src/theme/provider.tsx"]              # ALWAYS single-element array (one file per DIFF)
  #   operation: "edit"                              # LOCKED ENUM v0.1.1: "write" | "edit" | "multiedit"
  #   excerpts:
  #     - kind: "before"                             # "before" | "after" (Edit/Write)
  #                                                  # "before#N" | "after#N" for MultiEdit hunks 1..5
  #                                                  # (hunks beyond #5 silently dropped)
  #       text: "..."                                # ≤1200 chars; longer content gets elision marker
  #                                                  # exact: "\n... [elided N chars] ...\n"
  #                                                  # head=1000, tail=150
  #       elided: false                              # true if original was clipped

# Commands run during the session — ledger, not full output
commands_run: []
# - id: "CMD-001"
#   command: "npm test"        # ≤500 chars before redaction; REDACTED before write
#   exit_code: 0               # parsed from tool_result text where extractable; 0 fallback
#   duration_ms: 0             # parsed from tool_result where extractable; 0 fallback
#   stdout_summary: ""         # ≤1200 chars before redaction; REDACTED before write
#   stderr_summary: ""         # ALWAYS EMPTY in Phase 1 (Claude Code mixes stderr into result text;
#                              # split deferred to v0.2)

# Tests attempted and results — heuristic detection per bin/trail-test-runners.yml
test_evidence:
  passed: []
  # - id: "TEST-001"
  #   ref: "npm test"            # ≤140 chars (truncated bash command)
  #   cmd_ref: "CMD-001"         # NEW v0.1.1. Back-pointer to commands_run entry.
  failed: []
  not_run: []                 # tests that exist but weren't executed
  # coverage_change: ""       # DEFERRED to v0.2

# Who wrote what
provenance:
  authorship:
    ai_generated_estimate: ""   # "high" | "medium" | "low" | "unknown".
                                # Phase 1: constant "high".
    human_modified_estimate: "" # Phase 1: constant "unknown".
    method: ""                  # "hook-tracked" | "heuristic" | "post-hoc-transcript" | "self-reported"
                                # Phase 1: constant "post-hoc-transcript".
                                # Heuristic / hook modes deferred to v0.2.
  agent_touched_files: []     # files modified during agent active spans (deduped)
  human_touched_files: []     # Phase 1: always empty (mtime heuristic deferred to v0.2)

# THE LOAD-BEARING FIELD: claims with evidence refs.
summary:
  claims: []
  # - id: "CLAIM-001"                   # AB-5 (NEW v0.1.1): MUST be DETERMINISTIC across re-captures
  #                                     # of the same session. Algorithm (locked): the visible
  #                                     # `CLAIM-NNN` ordinal label is preserved for stable
  #                                     # human-facing references; the deterministic stability key is
  #                                     # `stable_id` (below) computed as
  #                                     # sha256(session_id || '|' || claim_text || '|' || position)
  #                                     # truncated to 16 hex chars. Consumers (libSQL claims.claim_id,
  #                                     # Phase 2 carry-forward) MUST key by stable_id, NOT by id.
  #                                     # Rationale: re-captures may reorder claims when diffs change;
  #                                     # CLAIM-NNN drifts; stable_id stays.
  #   stable_id: "0123456789abcdef"     # AB-5: 16-hex-char deterministic key (see id description above)
  #   text: "edit/write on src/theme/provider.tsx (3 change(s))"
  #   evidence_refs: ["DIFF-001", "DIFF-002", "DIFF-003", "TEST-001"]
  #   confidence: "supported"           # "supported" | "partial" | "ungrounded"
  #                                     # Phase 1: constant "supported" (gradient deferred to v0.2)
  #   synthesis_mode: "mechanical"      # NEW v0.1.1. ENUM: "mechanical" | "llm".
  #                                     # Mixed-mode runs are normal: LLM mode appends a
  #                                     # mechanical "Ran N test/validation command(s)" rollup.
  #   risk_classification:              # AB-1 / AB-1a (NEW v0.1.1; additive, all sub-fields nullable).
  #                                     # Per-claim risk metadata. Phase 1 (capture) does NOT compute
  #                                     # `agent` automatically — full classification is deferred to
  #                                     # schema v0.2. Phase 1 emits the structure with all fields null
  #                                     # so Phase 2 (UI) can populate creator_override / reviewer_override
  #                                     # without a schema migration.
  #     agent:                          # Agent's classification (DEFERRED to v0.2 — Phase 1 emits null block)
  #       level: null                   # Enum (when populated): "low" | "med" | "high" | "crit"
  #       rationale: null
  #     creator_override:               # AB-1: claim-level override by the PR creator
  #       level: null                   # null = not overridden; else "low" | "med" | "high" | "crit"
  #       reason: null                  # nullable string; required (non-null) when level non-null
  #       at: null                      # ISO 8601; required (non-null) when level non-null
  #       by: null                      # user identity (email/handle); required when level non-null
  #     reviewer_override:              # AB-1a: claim-level override by reviewer
  #       level: null                   # same shape as creator_override
  #       reason: null
  #       at: null
  #       by: null
  ungrounded_claim_count: 0   # populated by Trail; should be 0 for a healthy packet

# Approval trail — chronological, per-claim, per-decision history (AB-4; NEW v0.1.1).
# Phase 1 (capture) emits an empty array; entries are appended by Phase 2 (UI) via the
# atomic-write saga (B5 §3) and mirrored into libSQL.approval_trail (B5 §7.1).
# Granularity: ONE row per (claim_id, decision event); NOT a packet-level singleton.
approval_trail: []
# - claim_id: "CLAIM-001"               # OR the claim's stable_id (AB-5) — see implementation note below
#   decision: "accept"                  # Enum: "accept" | "changes" | "block" | "reject"
#   reason: ""                          # nullable string (≤500 chars after redact)
#   by: "user@example.com"              # decider identity (email/handle)
#   at: "2026-05-09T12:34:56+00:00"     # ISO 8601 (with +00:00 suffix, NOT Z — locked for parity)
# IMPLEMENTATION NOTE: Phase 1 emits this as []. claim_id values appended by Phase 2 reference the
# stable claim identifier — when stable_id is populated, Phase 2 SHOULD write stable_id; otherwise
# the human-facing CLAIM-NNN id (transitional). libSQL's approval_trail.claim_id column joins to
# claims.claim_id (which is stable_id post-AB-5).

# Posted-to-PR history (AB-2; NEW v0.1.1). Array (NOT singleton) — a packet may be posted multiple
# times across re-edits or re-pushes. Mirrors libSQL.posted_to_pr_history (B5 §7.1). Phase 1 emits
# an empty array; Phase 3b (gh CLI integration) appends entries on each successful post.
posted_to_pr: []
# - pr_url: "https://github.com/owner/repo/pull/42"
#   pr_number: 42
#   body_hash: ""                       # sha256 of the markdown that was posted (full hex; deterministic)
#   posted_at: "2026-05-09T12:34:56+00:00"
#   posted_by: "user@example.com"

# Redaction audit (AB-8; NEW v0.1.1). Per-pattern × per-layer breakdown of all redactions applied
# during this capture run. Mirrors libSQL.redaction_audit (B5 §7.1). This complements (does NOT
# replace) `agent_session.redaction_metadata.redactions_by_pattern` aggregate counts — the entries
# array is the authoritative breakdown by layer; the aggregate map is kept for back-compat and
# quick rollup. Phase 1 populates this array from the singleton pattern set (per A4.7 R-SEC-2).
redaction_audit:
  pattern_set_version: ""               # mirrors agent_session.redaction_metadata.pattern_set_version
  entries: []                           # NEW: per-pattern × per-layer rows (sorted alphabetically by
                                        # pattern_id, then by layer ascending — deterministic for parity)
  # - pattern_id: "slack-token"         # the pattern_name from bin/trail-redaction-patterns.yml
  #   layer: 1                          # enum: 1 (Layer 1 capture-time) | 2 (Layer 2 write-time)
  #                                     # | 3 (Layer 3 pre-commit; populated only when Phase 3a ships)
  #   count: 3                          # match count for this (pattern_id, layer) tuple
  #   locations_summary: "2 command outputs, 1 prompt"
  #                                     # human-readable summary of where matches were found;
  #                                     # NEVER includes raw match content (use 8-char-hex snippets
  #                                     # if precision needed — same locking as validation_errors).

# DEFERRED TO v0.2+ (deliberately omitted from v0.1.x):
#   risk:                      # full classification + reviewer_focus + blast_radius
#                              # (Note: ht-002 named this as a v0.1 must-have; surfaced in Stage B
#                              #  for UX-driven schema bump — may land in v0.1.2 if Stage B requires.)
#                              # NOTE (AB-stage): per-claim creator_override / reviewer_override
#                              # ARE in v0.1.1 (claims[].risk_classification); the full agent
#                              # classification (level + rationale + reviewer_focus + blast_radius)
#                              # remains deferred.
#   policy_results:            # depends on policy engine; out of MVP scope
#   transcript_appendix:       # privacy + size; ship in v0.2 with redaction layer

# Schema validation rules (enforced by TS port via Ajv; py-reference does NOT enforce):
# - packet_version ∈ {"0.1", "0.1.1"}
# - All evidence_refs in summary.claims MUST resolve to existing IDs in the packet
# - agent_session.started_at MUST be <= agent_session.ended_at (parsed as Date, not lex compare)
# - diff_summary.semantic_changes IDs MUST be unique
# - commands_run IDs MUST be unique
# - test_evidence entry IDs MUST be unique
# - At least one of (semantic_changes, commands_run, test_evidence) MUST be non-empty
#   (a packet with no observed work is invalid)
# - agent_session.redaction_metadata.pattern_set_version MUST be non-empty
#   (no packet ships without redaction running; no fallback default)
# - agent_session.redaction_metadata.validation_errors SHOULD be empty
#   (non-empty = Layer 2 caught a Layer 1 miss; investigate before trusting the packet)
# - diff_summary.semantic_changes[].operation MUST be ∈ {"write", "edit", "multiedit"} (NEW v0.1.1)
# - diff_summary.semantic_changes[].files MUST be a single-element array (NEW v0.1.1)
# - claims[].synthesis_mode MUST be ∈ {"mechanical", "llm"} (NEW v0.1.1)
# - _meta.capture_method MUST be ∈ {"post_hoc"} for v0.1.1 (extends in v0.2 to {"post_hoc", "hook"}) (NEW v0.1.1)
# - If ANY v0.1.1-only field is present (any of: _meta.capture_method, agent_session.models[],
#   claims[].synthesis_mode, test_evidence.passed[].cmd_ref, agent_session.redaction_metadata.pattern_set_origin),
#   packet_version MUST be "0.1.1". Prevents semantically-v0.1.1 packets from being falsely labeled "0.1".
#   (A4.5 FAIL-19; A4.7 R-SEC-1 added pattern_set_origin to the trigger list.)
# - agent_session.redaction_metadata.pattern_set_origin MUST be ∈ {"bundled", "user-supplied"} (NEW v0.1.1)
# - _meta.parent_packet_id MUST be string-or-null (AB-6; NEW v0.1.1). When non-null, MUST be a ULID.
#   Phase 1 Phase-2 consumers MAY treat a dangling parent_packet_id (target packet missing) as a
#   degraded-but-valid state (per B5 §5.4); schema validation does NOT verify referential integrity.
# - claims[].stable_id MUST be a 16-character lowercase hex string when present (AB-5; NEW v0.1.1).
#   Algorithm: sha256(session_id || '|' || claim_text || '|' || position).hexdigest()[:16].
#   Phase 1 SHOULD populate; Phase 2 carry-forward keys by stable_id.
# - claims[].risk_classification (AB-1, AB-1a; NEW v0.1.1) is OPTIONAL in Phase 1 packets. When present:
#   - level (any sub-block) MUST be ∈ {null, "low", "med", "high", "crit"}.
#   - When level is non-null, reason / at / by MUST also be non-null.
#   - Phase 1 emits the structure with all fields null (no agent classification computed in Phase 1).
# - approval_trail[] (AB-4; NEW v0.1.1) is an array (NOT singleton). Phase 1 emits []. When non-empty:
#   - decision MUST be ∈ {"accept", "changes", "block", "reject"}.
#   - claim_id MUST resolve to a claim in this packet (by id OR stable_id).
#   - at MUST be ISO 8601 with +00:00 suffix; entries MUST be in chronological order.
# - posted_to_pr[] (AB-2; NEW v0.1.1) is an array (NOT singleton). Phase 1 emits []. When non-empty:
#   - body_hash MUST be a 64-char lowercase hex string (sha256 of posted markdown).
#   - posted_at MUST be ISO 8601 with +00:00 suffix.
# - redaction_audit.entries[] (AB-8; NEW v0.1.1): per-pattern × per-layer breakdown.
#   - layer MUST be ∈ {1, 2, 3} (3 only populated once Phase 3a ships).
#   - entries MUST be sorted alphabetically by pattern_id, then by layer ascending (parity-locked).
#   - sum of entries[].count for layer ∈ {1} MUST equal agent_session.redaction_metadata.redactions_applied
#     (cross-check; Phase 1 invariant).
# - Tamper detection (AB-3, AB-3a-historical) is NOT a packet-schema field — it lives at the libSQL
#   layer (`packets.last_known_hash` column; see B5 §3.3). The packet YAML carries no integrity hash;
#   integrity is enforced by the storage saga. (Closed; documented for future readers.)
#
# Companion files:
# - schema/pr-change-packet.v0.1.1.schema.json — formal JSON Schema (Phase 1 deliverable;
#   generated from this YAML; consumed by TS port via Ajv)
# - schema/HOOK-EVENT-MATRIX.md — Claude Code hook → field map + risk register
# - schema/PACKET-SHAPE-ALTERNATIVES.md — alternate shapes considered + rationale (F4)
# - schema/REDACTION-DESIGN.md — three-layer redaction architecture (F5, hard gate)
# - docs/specs/phase-1-capture.md — reconciled implementation spec (authoritative for TS port)
# - docs/specs/phase-1-capture-audit.md — A2 audit (canonical reference for "why does the schema say X")
