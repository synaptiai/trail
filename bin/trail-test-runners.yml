# Trail test-runner detection patterns — default set
# Source: docs/specs/phase-1-capture.md §3 step 6 + §10.1 backport #4
#
# Each entry describes a test-runner ecosystem:
#   - name:          stable identifier used in commands_run heuristic detection.
#   - detect_glob:   relative glob (from repo root) whose presence indicates this
#                    runner is active in the project. Used by Phase 1+ tooling to
#                    short-circuit when no runner is plausibly present.
#   - exec_command:  canonical invocation string (informational; the heuristic
#                    matches the bash `command` field in commands_run[*]).
#   - command_pattern: regex (Python re / JS RegExp compatible) matched against
#                    the bash command string to flag a tool_use as a test command.
#                    Locked: anchors (`\b...\b`) + case-insensitive intent.
#
# v0.1.0 — initial extraction from py-reference/cli/trail.py:25-30 (TEST_COMMAND_RE)
#          per spec §10.1 backport #4 (test-runner config externalization).

version: "0.1.0"

runners:
  - name: pytest
    detect_glob: "**/pyproject.toml"
    exec_command: "pytest"
    command_pattern: '\bpytest\b'
  - name: jest
    detect_glob: "**/package.json"
    exec_command: "jest"
    command_pattern: '\bjest\b'
  - name: vitest
    detect_glob: "**/vitest.config.*"
    exec_command: "vitest"
    command_pattern: '\bvitest\b'
  - name: mocha
    detect_glob: "**/.mocharc.*"
    exec_command: "mocha"
    command_pattern: '\bmocha\b'
  - name: cargo-test
    detect_glob: "**/Cargo.toml"
    exec_command: "cargo test"
    command_pattern: '\bcargo\s+test\b'
  - name: npm-test
    detect_glob: "**/package.json"
    exec_command: "npm test"
    command_pattern: '\bnpm\s+(?:test|run\s+test)\b'
  - name: yarn-test
    detect_glob: "**/yarn.lock"
    exec_command: "yarn test"
    command_pattern: '\byarn\s+(?:test|run\s+test)\b'
  - name: go-test
    detect_glob: "**/go.mod"
    exec_command: "go test"
    command_pattern: '\bgo\s+test\b'
  - name: rspec
    detect_glob: "**/.rspec"
    exec_command: "rspec"
    command_pattern: '\brspec\b'
  - name: phpunit
    detect_glob: "**/phpunit.xml*"
    exec_command: "phpunit"
    command_pattern: '\bphpunit\b'
  # Project-local validators (carried over from py-reference TEST_COMMAND_RE for
  # back-compat with the canonical fixture session).
  - name: validate-canvas
    detect_glob: "**/validate_canvas.py"
    exec_command: "python validate_canvas.py"
    command_pattern: '\bvalidate_canvas\.py\b'
  - name: validate-template
    detect_glob: "**/validate-template.sh"
    exec_command: "./validate-template.sh"
    command_pattern: '\bvalidate-template\.sh\b'
