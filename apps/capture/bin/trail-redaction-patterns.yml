# Trail redaction patterns — default set
# Source: schema/REDACTION-DESIGN.md
# Version bump = bump pattern_set_version in the packet schema metadata.
#
# v0.1.2 (post-A4.5 design-review amendments):
#   ADDED: url-userinfo (P1-SEC-2 — defense-in-depth for token-in-URL)
#   ADDED: slack-token (P2-SEC-6)
#   ADDED: google-api-key (P2-SEC-6)
#   ADDED: sentry-dsn (P2-SEC-6)
#   ADDED: npm-token (P2-SEC-6)
#   ADDED: cloudflare-api-token (P2-SEC-6 — using known CF prefix patterns)
# v0.1.3 (post 2026-05-09 review per spec §Y.3):
#   NORMALIZED: drop Python `(?i)` inline-flag prefix in favor of per-pattern `flags` field.
#   Both Python `re.compile(pattern, flags)` and JS `new RegExp(pattern, flags)` consume directly.
#   Pattern YAML schema: { name, pattern, flags? } where flags is optional subset of 'imsx'.
# Note: high-entropy-string remains the catch-all for ≥40-char base64-shape strings.

version: "0.1.3"

patterns:
  # Cryptographic and API secrets
  - name: aws-access-key
    pattern: '\bAKIA[0-9A-Z]{16}\b'
  - name: aws-secret-key
    pattern: '\baws[_-]?secret[_-]?access[_-]?key["\s:=]+[A-Za-z0-9/+=]{40}\b'
    flags: 'i'
  - name: github-token
    pattern: '\bghp_[A-Za-z0-9]{36}\b'
  - name: github-fine-grained-token
    pattern: '\bgithub_pat_[A-Za-z0-9_]{82}\b'
  - name: openai-api-key
    pattern: '\bsk-[A-Za-z0-9]{32,}\b'
  - name: anthropic-api-key
    pattern: '\bsk-ant-[A-Za-z0-9-]{32,}\b'
  - name: stripe-key
    pattern: '\b(?:sk|pk)_(?:test|live)_[A-Za-z0-9]{24,}\b'
  - name: private-key-pem
    pattern: '-----BEGIN (?:RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----[\s\S]*?-----END (?:RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----'
  - name: slack-token
    pattern: '\bxox[baprs]-[A-Za-z0-9-]{10,}\b'
  - name: google-api-key
    pattern: '\bAIza[0-9A-Za-z_-]{35}\b'
  - name: sentry-dsn
    pattern: 'https://[a-f0-9]{32}@[\w.-]+/\d+'
  - name: npm-token
    pattern: '\bnpm_[A-Za-z0-9]{36}\b'
  - name: cloudflare-api-token
    # Cloudflare API tokens are 40 alphanumeric chars; rely on context (Authorization
    # header or env var name) to disambiguate from other 40-char strings.
    pattern: '\bcf[_-]?(?:api[_-]?)?token["\s:=]+[A-Za-z0-9_-]{40}\b'
    flags: 'i'

  # Connection strings (often contain embedded credentials)
  - name: postgres-url
    pattern: '\bpostgres(?:ql)?://[^\s"''<>]+'
  - name: mysql-url
    pattern: '\bmysql://[^\s"''<>]+'
  - name: mongodb-url
    pattern: '\bmongodb(?:\+srv)?://[^\s"''<>]+'
  - name: redis-url
    pattern: '\bredis://[^\s"''<>]+'
  - name: url-userinfo
    # Defense-in-depth: catches token-in-URL like https://x-access-token:ghp_xxx@github.com/...
    # OR https://oauth2:<token>@gitlab.com/... regardless of token format.
    # Specifically targets the userinfo segment between scheme and host.
    pattern: '\bhttps?://[^\s"''<>@/]+:[^\s"''<>@/]+@[^\s"''<>/]+'

  # Generic patterns (higher false-positive rate; on by default per conservative-by-default principle)
  - name: bearer-token-header
    pattern: '\b[Aa]uthorization:\s*[Bb]earer\s+[A-Za-z0-9_\-\.=]{16,}\b'
  - name: jwt
    pattern: '\beyJ[A-Za-z0-9_=-]+\.eyJ[A-Za-z0-9_=-]+\.[A-Za-z0-9_=\-+/]+\b'
  - name: high-entropy-string
    # Conservative: only match base64-shaped strings >=40 chars.
    # `/` deliberately excluded from the char class — caused false-positives on long
    # file paths (corrections 2026-05-08 entry "redaction-pattern-overfire-on-paths").
    # Classic base64 secrets containing `/` are caught by more specific patterns
    # (postgres-url, aws-secret-key, private-key-pem, jwt, bearer-token-header, url-userinfo).
    pattern: '\b[A-Za-z0-9+]{40,}={0,2}\b'
