name: UI Quality Gates (TS + Rust)

# Per PR #6 cycle-1 review F10 (P2 ci-correctness consensus HIGH):
#
# The repository previously had no CI exercising the new apps/ui/ TypeScript
# code or the apps/ui/src-tauri/ Rust crate. Reviewers could not verify the
# 48 vitest + 14 cargo test claims without a local checkout. This workflow
# runs the full quality gate (typecheck, lint, vitest, cargo check, cargo
# test) on every PR that touches apps/ui or workflow files.
#
# Trigger scope: only paths that affect the UI/Tauri pipeline. The pre-existing
# Mycelium dogfood/Python jobs are governed by validate.yml + dogfood.yml and
# remain out of scope here.

on:
  push:
    branches: [main]
    paths:
      - 'apps/ui/**'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - 'tsconfig.base.json'
      - '.github/workflows/ui-quality-gates.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/ui/**'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - 'tsconfig.base.json'
      - '.github/workflows/ui-quality-gates.yml'

# Cancel in-flight runs when a new commit arrives on the same ref.
concurrency:
  group: ui-quality-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ts-quality:
    name: TS — typecheck, lint, vitest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate design tokens (codegen-tokens.mjs)
        run: pnpm --filter @trail/ui run tokens:gen

      - name: Typecheck (tsc --noEmit)
        run: pnpm --filter @trail/ui run typecheck

      - name: Lint (ESLint TS/TSX + lint-css-tokens.mjs CSS scan)
        run: pnpm --filter @trail/ui run lint

      - name: Vitest (unit tests, including jest-axe a11y scans)
        run: pnpm --filter @trail/ui run test

      - name: Build (vite production bundle)
        # Verifies the bundle compiles end-to-end; required for the cargo
        # check job below since tauri.conf.json points frontendDist at ../dist.
        run: pnpm --filter @trail/ui run build

      - name: Upload built frontend
        uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: apps/ui/dist
          retention-days: 1

  e2e-playwright:
    # v0.1.1 B12: Playwright was passing locally but never CI-gated. The
    # v0.1.0 IPC bug would NOT have been caught here (browser-mode mocks the
    # bridge), but enforcing the browser-mode tier closes a class of bugs the
    # vitest-only gate cannot catch (vite preview production-bundle render,
    # 1000-packet sidebar cold-render budget, real Chromium rendering).
    # The deeper `tauri` mode runs nightly via a separate workflow (TBD).
    name: E2E — Playwright (browser mode)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: ts-quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download built frontend
        uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: apps/ui/dist

      - name: Install Playwright browsers (Chromium only)
        run: pnpm --filter @trail/ui exec playwright install --with-deps chromium

      - name: Run Playwright E2E (browser mode)
        run: pnpm --filter @trail/ui run e2e
        env:
          TRAIL_E2E_MODE: browser

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/ui/playwright-report
          retention-days: 7

  rust-quality:
    name: Rust — cargo check + cargo test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: ts-quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + target
        # gh#17 fix: namespace cache key by `github.repository`. Prior key
        # was repo-agnostic, which let pre-rename caches (from when this
        # repo was named `trail` and checked out at
        # `/home/runner/work/trail/trail/`) keep getting restored after the
        # rename to `trail-internal`. tauri-build bakes absolute paths into
        # `target/debug/build/tauri-*/out/permissions/`, so the stale cache
        # caused `cargo check` to fail with `failed to read plugin
        # permissions: failed to read file '/home/runner/work/trail/trail/
        # apps/ui/src-tauri/target/.../app_hide.toml'`.
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/ui/src-tauri/target
          key: cargo-${{ runner.os }}-${{ github.repository }}-${{ hashFiles('apps/ui/src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ github.repository }}-

      - name: Install Tauri Linux build deps
        # Tauri 2.x on Linux needs webkit2gtk-4.1 + ancillary libs. These are
        # only needed for the desktop build path; cargo check + cargo test
        # link against them transitively via tauri's build script.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf

      - name: Download built frontend
        uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: apps/ui/dist

      - name: cargo check (workspace)
        working-directory: apps/ui/src-tauri
        run: cargo check --locked

      - name: cargo test (workspace)
        # Emits wire-snapshots to apps/ui/test-fixtures/wire-snapshots/
        # via tests/ipc_dispatch_smoke.rs::dispatch_and_snapshot (gh#2 P1).
        # The wire-roundtrip step below consumes these without needing an
        # artifact transfer because we run in the same job.
        #
        # PR #34 cycle-4: `--test-threads=1` is retained because some
        # test bodies mutate process-wide env vars (HOME, PATH). Five
        # tauri::test::MockRuntime-based tests are marked
        # `#[cfg_attr(target_os = "linux", ignore)]` in the test source
        # (search for "tauri MockRuntime Linux FD leak"); they exercise
        # the wire-shape via the dispatcher and pass everywhere except
        # ubuntu-latest, where MockRuntime leaks a GTK resource that
        # exhausts after ~13 boots. macOS local + dev machines still
        # run them.
        working-directory: apps/ui/src-tauri
        run: cargo test --locked -- --test-threads=1

      # ----- gh#2 Phase 1: wire-roundtrip bridge -----
      #
      # After cargo test emits wire snapshots, this step boots Node and
      # runs the vitest wire-contract suite. The suite reads each snapshot,
      # looks up the corresponding TS Zod schema in contract.ts, and
      # asserts the schema accepts the Rust-serialized JSON. Closes the
      # cross-language contract gap that caused v0.1.2 Bug 1 (Rust serde
      # `null` rejected by TS `.optional()` → sidebar bricked on first
      # paint). See docs/plans/gh-2-tauri-driver.md (Option E) for the
      # full mechanism.
      #
      # Co-located in rust-quality (not a separate job) because the
      # snapshots are emitted by cargo test in this same runner — no
      # cross-job artifact transfer needed.

      - name: Set up pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies (for vitest wire-roundtrip)
        run: pnpm install --frozen-lockfile

      - name: Wire-roundtrip — Zod parses every Rust wire snapshot
        run: pnpm --filter @trail/ui run test:wire-roundtrip

  secrets-scan:
    name: Secrets scan (redaction-pattern engine)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js 20
        # The scanner is a Node script (bin/secrets-scan.mjs). It uses Node's
        # built-in regex engine (PCRE-compatible) — required because the
        # redaction-pattern catalog uses `\b` word-boundary anchors that
        # POSIX ERE (the engine `grep -E` uses) does not support.
        # Per PR #6 cycle-2 review N15 (P1 ci-correctness consensus HIGH).
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Self-test the scanner (planted-secret fixtures)
        # Proves the scanner actually catches secrets — not just appears to.
        # Plants known-shape tokens for every catalog pattern it tests, runs
        # the matcher, asserts every plant is caught, and cleans up. This step
        # MUST pass before the diff scan can be trusted.
        run: node bin/secrets-scan.mjs --self-test

      - name: Scan diff for known secret patterns
        # Per F10's secrets-scan requirement. The scanner reads the catalog,
        # compiles each pattern via Node's RegExp (which supports `\b`), then
        # walks the unified-diff's added lines. Hits fail the job; the author
        # can either redact-and-re-push or, if the match is a documented test
        # fixture, add the file path to bin/secrets-scan.mjs's ALLOWLIST_PATHS.
        run: |
          set -euo pipefail
          if [ -n "${GITHUB_BASE_REF:-}" ]; then
            git fetch --no-tags origin "$GITHUB_BASE_REF" --depth=50
            range="origin/$GITHUB_BASE_REF...HEAD"
          else
            range="HEAD~1...HEAD"
          fi
          node bin/secrets-scan.mjs --diff "$range"
